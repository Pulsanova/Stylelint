name: CI
on: [push, pull_request]
jobs:
    "Lint":
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v4
              with: { node-version-file: '.nvmrc' }
            - run: npm ci
            - run: npm run lint -- --max-warnings 0 --color
